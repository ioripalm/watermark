name: build-watermark-exe

on:
    workflow_dispatch:

jobs:
    build:
        runs-on: windows-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.11'

            - name: Upgrade pip
              run: python -m pip install --upgrade pip

            - name: Install dependencies
              run: pip install -r requirements.txt

            - name: Install Nuitka
              run: pip install nuitka

            - name: Build exe
              run: |
                  python -m nuitka ^
                      --onefile ^
                      --enable-plugin=numpy ^
                      --include-package=blind_watermark ^
                      watermark.py

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: watermark-exe
                  path: watermark.exe
